version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: documind_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: documind_ai
      MYSQL_USER: documind
      MYSQL_PASSWORD: documind
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=documind
      - DB_PASSWORD=documind
      - DB_NAME=documind_ai
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/faiss_index:/app/faiss_index
    depends_on:
      mysql:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: documind_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama pull llama3 && ollama serve"

volumes:
  mysql_data:
  ollama_data:
