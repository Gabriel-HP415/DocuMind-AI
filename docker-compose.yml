name: documind-ai

services:
  mysql:
    image: mysql:8.4
    container_name: documind_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: documind_ai
      MYSQL_USER: documind
      MYSQL_PASSWORD: documind
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: documind
      DB_PASSWORD: documind
      DB_NAME: documind_ai
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_NUM_CTX: "2048"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/faiss_index:/app/faiss_index
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: documind_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s

  frontend:
    image: nginx:1.27-alpine
    container_name: documind_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  ollama-pull:
    image: ollama/ollama:latest
    container_name: documind_ollama_pull
    depends_on:
      - ollama
    entrypoint: ["ollama"]
    command: ["pull", "llama3.2:3b"]
    restart: "no"
    networks:
      - default

volumes:
  mysql_data:
  ollama_data:
