<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen relative overflow-hidden flex items-center justify-center p-4 md:p-8">
<!-- Atmospheric Background Elements (Glassmorphism / AI Feel) -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed/30 blur-[120px] opacity-60"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed/20 blur-[150px] opacity-70"></div>
</div>
<!-- Sign-up Card -->
<main class="w-full max-w-[480px] bg-surface-container-lowest/80 backdrop-blur-xl border border-outline-variant/30 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] p-8 sm:p-10 relative z-10 flex flex-col items-center">
<!-- Brand Header -->
<div class="flex items-center gap-2 mb-8">
<div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center text-on-primary-container shadow-sm">
<span class="material-symbols-outlined icon-fill text-[24px]" data-icon="description">description</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary font-bold tracking-tight">DocuMind</h1>
</div>
<!-- Typography Context -->
<div class="text-center w-full mb-8">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Create your account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Start organizing and analyzing your academic research today.</p>
</div>
<!-- Sign-up Form -->
<form id="registerForm" class="w-full flex flex-col gap-5">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant" for="fullName">Full Name</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-transparent rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline/60 focus:bg-surface-container-lowest focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all" id="fullName" name="fullName" placeholder="Dr. Jane Doe" required="" type="text"/>
</div>
<!-- University Email -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">University Email</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-transparent rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline/60 focus:bg-surface-container-lowest focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all" id="email" name="email" placeholder="jane.doe@university.edu" required="" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border border-transparent rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline/60 focus:bg-surface-container-lowest focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all pr-10" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button" onclick="var i=document.getElementById('password');var s=this.querySelector('span');i.type=i.type==='password'?'text':'password';s.textContent=i.type==='password'?'visibility_off':'visibility'">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<p class="font-body-sm text-body-sm text-outline mt-1">Must be at least 8 characters long.</p>
</div>
<!-- Primary Action -->
<button id="registerBtn" class="w-full mt-2 py-3.5 px-4 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-on-primary-fixed-variant transition-colors shadow-sm flex items-center justify-center gap-2 group" type="submit">
                <span id="registerBtnText">Create Account</span>
                <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-body-sm text-body-sm text-outline">or sign up with</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<!-- Social Actions -->
<div class="w-full flex flex-col sm:flex-row gap-3">
<button class="flex-1 py-2.5 px-4 bg-surface-container-lowest border border-outline-variant/60 text-on-surface font-label-md text-label-md rounded-lg hover:bg-surface-container-low hover:border-outline transition-all flex items-center justify-center gap-2" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Google
            </button>
<button class="flex-1 py-2.5 px-4 bg-surface-container-lowest border border-outline-variant/60 text-on-surface font-label-md text-label-md rounded-lg hover:bg-surface-container-low hover:border-outline transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="school">school</span>
                Institution
            </button>
</div>
<!-- Footer Link -->
<p class="font-body-sm text-body-sm text-on-surface-variant mt-8 text-center">
            Already have an account? 
            <a class="text-primary font-medium hover:underline hover:text-primary-fixed-variant transition-colors" href="sign_in.html">Log in here</a>
</p>
</main>
<script src="js/auth.js"></script>
<script>
        if (isLoggedIn()) { window.location.href = 'dashboard.html'; }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('registerBtnText');
            btn.disabled = true;
            btnText.textContent = 'Creating account...';

            const password = document.getElementById('password').value;
            if (password.length < 8) {
                showToast('Password must be at least 8 characters', 'error');
                btn.disabled = false;
                btnText.textContent = 'Create Account';
                return;
            }

            try {
                const res = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullname: document.getElementById('fullName').value,
                        email: document.getElementById('email').value,
                        password: password
                    })
                });

                const data = await res.json();
                if (!res.ok) {
                    showToast(data.detail || 'Registration failed', 'error');
                    btn.disabled = false;
                    btnText.textContent = 'Create Account';
                    return;
                }

                showToast('Account created! Redirecting to login...', 'success');
                setTimeout(() => { window.location.href = 'sign_in.html'; }, 1000);
            } catch (err) {
                showToast('Network error. Is the backend running?', 'error');
                btn.disabled = false;
                btnText.textContent = 'Create Account';
            }
        });
    </script>
</body></html>
