<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DocuMind - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "on-tertiary-fixed-variant": "#7b2f00",
                            "on-secondary-container": "#fffbff",
                            "outline-variant": "#c7c4d8",
                            "on-tertiary-fixed": "#351000",
                            "surface-bright": "#faf8ff",
                            "primary-fixed-dim": "#c3c0ff",
                            "error-container": "#ffdad6",
                            "on-primary-container": "#dad7ff",
                            "inverse-primary": "#c3c0ff",
                            "surface-container-low": "#f2f3ff",
                            "surface": "#faf8ff",
                            "background": "#faf8ff",
                            "on-primary-fixed": "#0f0069",
                            "tertiary-fixed-dim": "#ffb695",
                            "primary-fixed": "#e2dfff",
                            "surface-tint": "#4d44e3",
                            "on-tertiary-container": "#ffd2be",
                            "inverse-surface": "#283044",
                            "on-background": "#131b2e",
                            "tertiary-fixed": "#ffdbcc",
                            "surface-container-highest": "#dae2fd",
                            "on-primary": "#ffffff",
                            "tertiary": "#7e3000",
                            "on-tertiary": "#ffffff",
                            "on-surface-variant": "#464555",
                            "surface-container-high": "#e2e7ff",
                            "on-secondary-fixed": "#25005a",
                            "outline": "#777587",
                            "tertiary-container": "#a44100",
                            "surface-variant": "#dae2fd",
                            "surface-dim": "#d2d9f4",
                            "on-secondary-fixed-variant": "#5a00c6",
                            "on-primary-fixed-variant": "#3323cc",
                            "secondary-fixed": "#eaddff",
                            "secondary-container": "#8a4cfc",
                            "error": "#ba1a1a",
                            "on-secondary": "#ffffff",
                            "inverse-on-surface": "#eef0ff",
                            "on-surface": "#131b2e",
                            "secondary-fixed-dim": "#d2bbff",
                            "on-error": "#ffffff",
                            "primary-container": "#4f46e5",
                            "on-error-container": "#93000a",
                            "surface-container": "#eaedff",
                            "secondary": "#712ae2",
                            "surface-container-lowest": "#ffffff",
                            "primary": "#3525cd"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                    },
                    "spacing": {
                            "container-max": "1280px",
                            "unit": "8px",
                            "margin-mobile": "16px",
                            "margin-desktop": "40px",
                            "gutter": "24px"
                    },
                    "fontFamily": {
                            "display-lg": ["Inter"],
                            "code-sm": ["Geist"],
                            "display-lg-mobile": ["Inter"],
                            "body-md": ["Inter"],
                            "body-lg": ["Inter"],
                            "headline-lg": ["Inter"],
                            "label-md": ["Geist"],
                            "body-sm": ["Inter"],
                            "headline-md": ["Inter"]
                    },
                    "fontSize": {
                            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "code-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                            "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-pattern {
            background-image: radial-gradient(var(--tw-colors-outline-variant) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.1;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md">
<!-- Abstract Background Elements -->
<div class="absolute inset-0 bg-pattern pointer-events-none"></div>
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary-fixed-dim/30 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] bg-secondary-fixed-dim/30 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Login Card -->
<main class="w-full max-w-md mx-margin-mobile md:mx-auto relative z-10">
<div class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm p-8 md:p-10 backdrop-blur-xl">
<!-- Header -->
<div class="text-center mb-8">
<div class="flex justify-center items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-[32px] font-variation-settings:'FILL' 1;">description</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">DocuMind</h1>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to your AI PDF Assistant</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-low border border-outline-variant/50 rounded-lg font-body-sm text-body-sm text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-low border border-outline-variant/50 rounded-lg font-body-sm text-body-sm text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibility-icon">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-lg text-on-primary bg-gradient-to-r from-primary to-primary-container hover:shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all font-label-md text-label-md relative overflow-hidden group" type="submit">
<span class="absolute inset-0 w-full h-full bg-white/10 group-hover:bg-transparent transition-colors"></span>
<span class="relative">Sign In</span>
<span class="material-symbols-outlined text-[20px] relative transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="mt-8 mb-6 relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant font-body-sm text-body-sm">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex justify-center items-center gap-2 py-2 px-4 border border-outline-variant/50 rounded-lg bg-transparent hover:bg-surface-container-low hover:border-primary/50 text-on-surface font-body-sm text-body-sm transition-all">
<span class="material-symbols-outlined text-[20px]">google</span>
                    Google
                </button>
<button class="flex justify-center items-center gap-2 py-2 px-4 border border-outline-variant/50 rounded-lg bg-transparent hover:bg-surface-container-low hover:border-primary/50 text-on-surface font-body-sm text-body-sm transition-all">
<span class="material-symbols-outlined text-[20px]">apps</span>
                    Apple
                </button>
</div>
<!-- Sign Up Link -->
<p class="mt-8 text-center font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-medium text-primary hover:text-primary-container hover:underline transition-all" href="#">Sign up for free</a>
</p>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
